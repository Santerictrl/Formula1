name: Update F1 Standings

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 8 AM
  workflow_dispatch:   # Allows manual testing

permissions:
  contents: write      # THIS FIXES ERROR 128 (Permission to save files)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Upgraded from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded from v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Update Script
        run: python fetch_f1.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Updated F1 Standings [Automated]" || echo "No changes to commit"
          git push