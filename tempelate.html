<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 2026 Dashboard</title>
    <style>
        body { background-color: #15151e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { border-left: 5px solid #e10600; padding-left: 15px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; background: #1f1f27; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th { background: #e10600; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #38383f; }
        tr:hover { background: #2b2b35; }
    </style>
</head>
<body>
    <div class="container">
        <h1>2026 Driver Standings</h1>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Driver</th>
                    <th>Team</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</body>
</html>
