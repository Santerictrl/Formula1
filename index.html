<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>F1 2026 Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="countdown-container" style="background: #1f1f27; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-top: 5px solid #e10600;">
    <h3>Countdown to Lights Out:</h3>
    <div id="timer" style="font-size: 2rem; font-weight: bold; color: #ffeb3b;">00:00:00:00</div>
    <p id="race-name-label" style="text-transform: uppercase; letter-spacing: 2px;"></p>
</div>

<script>
    // We will pass the race date from Python into this variable
    const raceDate = new Date("").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = raceDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("timer").innerHTML = "RACE WEEKEND LIVE";
        }
    }, 1000);
</script>
    <h1>Formula 1 2026 Standings</h1>
    <div style="background: #1f1f27; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #e10600;">
    <h2>Next Race: </h2>
    <p>Date: </p>
    <img src="images/" alt="Track Map" style="max-width: 300px; display: block; margin: 10px auto;">
</div>
    <table>
        <thead>
            <tr>
                <th>Pos</th>
                <th>Driver</th>
                <th>Team</th>
                <th>Points</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4">If you see this, Python hasn't replaced the data yet!</td></tr>
        </tbody>
    </table>
</body>
</html>
